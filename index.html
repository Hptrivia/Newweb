<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Trivia Gauntlet</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2544021252380572"
    crossorigin="anonymous"></script>

  <style>
    :root {
      --ad-h: 72px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #0b0b0b;
      color: #f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding-bottom: calc(var(--ad-h) + env(safe-area-inset-bottom));
    }

    .toptext {
      padding: 12px 14px 10px;
      background: #111;
    }

    .toptext h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .toptext p {
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      color: #cfcfcf;
    }

    .app-frame {
      display: block;
      width: 100%;
      height: calc(100vh - 92px - var(--ad-h));
      min-height: 520px;
      border: 0;
      background: #fff;
    }

    .adbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(var(--ad-h) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: #111;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.25);
    }

    @media (max-width: 420px) {
      :root {
        --ad-h: 60px;
      }

      .toptext h1 {
        font-size: 19px;
      }

      .toptext p {
        font-size: 13px;
      }

      .app-frame {
        height: calc(100vh - 84px - var(--ad-h));
        min-height: 480px;
      }
    }
  </style>
</head>
<body>

  <div class="toptext">
    <h1>Trivia Gauntlet</h1>
    <p>Play free trivia quizzes across TV, movies, games, sports, and more.</p>
  </div>

  <iframe
    class="app-frame"
    src="https://trivia-5pja.onrender.com/"
    title="Trivia Gauntlet"
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
    allow="fullscreen"
  ></iframe>

  <div class="adbar">
    <div style="color:#aaa;font:14px Arial;">Sticky ad goes here</div>
  </div>

</body>
</html>
